name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # ── Lambda (Python) ────────────────────────────────────────────────────────
  lambda-test:
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: ap-northeast-1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pytest pydantic boto3

      - name: Run Lambda tests
        run: pytest lambda/ -v

  # ── Frontend (React + TypeScript) ─────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_ENDPOINT: https://placeholder.execute-api.ap-northeast-1.amazonaws.com
          VITE_COGNITO_USER_POOL_ID: ap-northeast-1_placeholder
          VITE_COGNITO_CLIENT_ID: placeholder
          VITE_COGNITO_DOMAIN: health-logger-prod
