name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - "migrations/athena/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "migrations/athena/**"

# 同一ブランチでの並行実行を防ぎ state lock 競合を回避する
# cancel-in-progress: PR は新しい push で古いランをキャンセル
# main への push は直列化（キャンセルしない）
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TF_VERSION: "1.12.0"
  AWS_REGION: ap-northeast-1

jobs:
  terraform-prod:
    name: "Terraform Prod"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: terraform/envs/prod

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var='lambda_s3_keys={"create_record":"placeholder","get_latest":"placeholder","push_subscribe":"placeholder","push_notify":"placeholder","get_item_config":"placeholder","save_item_config":"placeholder","delete_record":"placeholder","get_env_data":"placeholder","get_env_data_latest":"placeholder"}' \
            -no-color -out=tfplan
        env:
          TF_VAR_vapid_private_key: ${{ secrets.VAPID_PRIVATE_KEY_PROD }}

      - name: Comment PR with plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('Terraform Plan (prod)')
            );
            const output = `#### Terraform Plan (prod)
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\``;
            if (botComment) {
              github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: botComment.id, body: output,
              });
            } else {
              github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body: output,
              });
            }

      - name: Terraform Apply (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan

      - name: Run Athena schema migrations (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ github.workspace }}
        run: |
          pip install boto3 --quiet
          python3 scripts/athena-migrate.py
        env:
          ATHENA_DATABASE: health_logger_prod_health_logs
          ATHENA_OUTPUT_BUCKET: health-logger-prod
          MIGRATION_TRACKING_TABLE: health-logger-prod-athena-migrations
