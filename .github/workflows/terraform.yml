name: Terraform

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - "terraform/**"
  push:
    branches: [ main, develop ]
    paths:
      - "terraform/**"

permissions:
  id-token: write   # OIDC token
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: ap-northeast-1

jobs:
  terraform-dev:
    name: "Terraform Dev"
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: terraform/envs/dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -var="ecr_image=placeholder" -no-color -out=tfplan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD_DEV }}

      - name: Comment PR with plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('Terraform Plan (dev)'));
            const output = `#### Terraform Plan (dev)
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\``;
            if (botComment) {
              github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: botComment.id, body: output });
            } else {
              github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: output });
            }

      - name: Terraform Apply (develop branch only)
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan

  terraform-prod:
    name: "Terraform Prod"
    runs-on: ubuntu-latest
    environment: prod
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: terraform/envs/prod

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Plan
        run: terraform plan -var="ecr_image=${{ secrets.ECR_IMAGE_PROD }}" -no-color
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD_PROD }}

      - name: Terraform Apply
        run: terraform apply -var="ecr_image=${{ secrets.ECR_IMAGE_PROD }}" -auto-approve
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD_PROD }}
