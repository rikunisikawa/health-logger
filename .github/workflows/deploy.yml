name: Deploy

on:
  push:
    branches:
      - main  # prod only

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  TF_VERSION: "1.7.5"

jobs:
  # ── 1. Build Lambda ZIPs and upload to S3 artifacts ───────────────────────
  build-lambda:
    name: Build Lambda ZIPs
    runs-on: ubuntu-latest
    outputs:
      create_record_key: ${{ steps.upload.outputs.create_record_key }}
      get_latest_key:    ${{ steps.upload.outputs.get_latest_key }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package create_record Lambda
        run: |
          cd lambda/create_record
          pip install -r requirements.txt -t . --quiet
          zip -r ../../create_record.zip . -x "test_*" "*.pyc" "__pycache__/*"

      - name: Package get_latest Lambda
        run: |
          cd lambda/get_latest
          pip install -r requirements.txt -t . --quiet
          zip -r ../../get_latest.zip . -x "test_*" "*.pyc" "__pycache__/*"

      - name: Upload ZIPs to S3 artifacts bucket
        id: upload
        run: |
          BUCKET="${{ secrets.LAMBDA_ARTIFACTS_BUCKET_PROD }}"
          SHA="${{ github.sha }}"
          CREATE_KEY="create_record/${SHA}.zip"
          LATEST_KEY="get_latest/${SHA}.zip"

          aws s3 cp create_record.zip "s3://${BUCKET}/${CREATE_KEY}"
          aws s3 cp get_latest.zip    "s3://${BUCKET}/${LATEST_KEY}"

          echo "create_record_key=${CREATE_KEY}" >> $GITHUB_OUTPUT
          echo "get_latest_key=${LATEST_KEY}"    >> $GITHUB_OUTPUT

  # ── 2. Terraform apply (infrastructure + Lambda config) ───────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build-lambda
    environment: prod
    defaults:
      run:
        working-directory: terraform/envs/prod

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var='lambda_s3_keys={"create_record":"${{ needs.build-lambda.outputs.create_record_key }}","get_latest":"${{ needs.build-lambda.outputs.get_latest_key }}"}'
        env:
          TF_VAR_github_access_token: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}

  # ── 3. Trigger Amplify build ──────────────────────────────────────────────
  amplify-deploy:
    name: Trigger Amplify Build
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start Amplify job
        run: |
          aws amplify start-job \
            --app-id "${{ secrets.AMPLIFY_APP_ID_PROD }}" \
            --branch-name main \
            --job-type RELEASE

      - name: Deployment summary
        run: |
          echo "### Deployed to prod" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Lambda create_record: \`${{ needs.build-lambda.outputs.create_record_key }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Lambda get_latest:    \`${{ needs.build-lambda.outputs.get_latest_key }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Amplify: build triggered" >> $GITHUB_STEP_SUMMARY
