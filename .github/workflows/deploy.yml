name: Deploy

on:
  push:
    branches:
      - main     # → prod
      - develop  # → dev

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      # ── Determine environment ─────────────────────────────────────────────────
      - name: Set environment variables
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "ENV=prod"          >> $GITHUB_OUTPUT
            echo "ROLE_ARN=${{ secrets.AWS_ROLE_ARN_PROD }}"     >> $GITHUB_OUTPUT
            echo "ECR_REPO=${{ secrets.ECR_REPO_PROD }}"         >> $GITHUB_OUTPUT
            echo "ECS_CLUSTER=${{ secrets.ECS_CLUSTER_PROD }}"   >> $GITHUB_OUTPUT
            echo "ECS_SERVICE=${{ secrets.ECS_SERVICE_PROD }}"   >> $GITHUB_OUTPUT
          else
            echo "ENV=dev"           >> $GITHUB_OUTPUT
            echo "ROLE_ARN=${{ secrets.AWS_ROLE_ARN_DEV }}"      >> $GITHUB_OUTPUT
            echo "ECR_REPO=${{ secrets.ECR_REPO_DEV }}"          >> $GITHUB_OUTPUT
            echo "ECS_CLUSTER=${{ secrets.ECS_CLUSTER_DEV }}"    >> $GITHUB_OUTPUT
            echo "ECS_SERVICE=${{ secrets.ECS_SERVICE_DEV }}"    >> $GITHUB_OUTPUT
          fi

      # ── AWS OIDC auth ─────────────────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.env.outputs.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── ECR login ─────────────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push Docker image ─────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.env.outputs.ECR_REPO }}:latest
            ${{ steps.env.outputs.ECR_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }}

      # ── DB migrations ─────────────────────────────────────────────────────────
      - name: Run DB migrations via ECS RunTask
        uses: aws-actions/amazon-ecs-run-task@v1
        with:
          cluster: ${{ steps.env.outputs.ECS_CLUSTER }}
          task-definition: ${{ steps.env.outputs.ECS_SERVICE }}
          container-name: app
          command: '["bundle", "exec", "rails", "db:migrate"]'
          wait-for-task-stopped: true

      # ── ECS rolling deploy ────────────────────────────────────────────────────
      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ steps.env.outputs.ECS_CLUSTER }} \
            --service ${{ steps.env.outputs.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ steps.env.outputs.ECS_CLUSTER }} \
            --services ${{ steps.env.outputs.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Deployment summary
        run: |
          echo "### Deployed to ${{ steps.env.outputs.ENV }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ steps.env.outputs.ECR_REPO }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Cluster: \`${{ steps.env.outputs.ECS_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Service: \`${{ steps.env.outputs.ECS_SERVICE }}\`" >> $GITHUB_STEP_SUMMARY
