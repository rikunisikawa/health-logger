name: 新機能
description: 新しい機能の追加・改善提案
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        新機能・改善の提案です。実装前に背景と目的を明確にしてください。

  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: なぜこの機能が必要か
      placeholder: |
        - 現状の課題: ...
        - これにより: ...
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: やること
      description: 実装タスクをチェックボックスで列挙
      value: |
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: 完了条件
      description: 何ができたら完了か
      placeholder: |
        - ...が動作すること
        - テストが全件 PASSED
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 影響範囲
      options:
        - フロントエンドのみ
        - Lambda のみ
        - Terraform のみ
        - フロントエンド + Lambda
        - フルスタック（フロント + Lambda + Terraform）
    validations:
      required: true
