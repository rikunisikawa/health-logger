version: 2

models:
  - name: stg_env__hourly
    description: "Open-Meteo 環境データの正規化ビュー（型変換・NULL除外）"
    columns:
      - name: observation_datetime_jst
        description: "観測日時（JST）"
        tests:
          - not_null
      - name: location_id
        description: "観測地点ID"
        tests:
          - not_null
      - name: pressure_hpa
        description: "気圧（hPa）"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 900
              max_value: 1100
      - name: temperature_c
        description: "気温（摂氏）"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: -50
              max_value: 60
      - name: humidity_pct
        description: "相対湿度（%）"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100

  - name: stg_health__records
    description: "体調記録の正規化ビュー（型変換・NULL除外）"
    columns:
      - name: record_id
        description: "レコードID（UUID）"
        tests:
          - not_null
          - unique
      - name: user_id
        description: "ユーザーID（UUID）"
        tests:
          - not_null
      - name: record_type
        description: "記録種別（daily/event/status）。旧レコードは NULL の場合あり"
        tests:
          - not_null:
              config:
                severity: warn
          - accepted_values:
              values: ['daily', 'event', 'status']
              config:
                severity: warn
      - name: fatigue_score
        description: "疲労感スコア（0-10）"
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 10
              config:
                severity: warn
      - name: mood_score
        description: "気分スコア（0-10）"
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 10
              config:
                severity: warn
      - name: motivation_score
        description: "やる気スコア（0-10）"
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 10
              config:
                severity: warn
      - name: flags
        description: "体調フラグ ビットマスク（poor_sleep=1, headache=2, stomachache=4, exercise=8, alcohol=16, caffeine=32）"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 63
      - name: recorded_at
        description: "記録日時"
        tests:
          - not_null
