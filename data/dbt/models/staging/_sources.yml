version: 2

sources:
  - name: raw_env
    database: AwsDataCatalog
    schema: health_logger_env_prod
    description: "Open-Meteo から取得した環境データ（EventBridge daily 00:00 JST 実行）"
    meta:
      owner: riku_nishikawa
      sensitivity: public
      domain: environment
      ingest_schedule: "daily 00:00 JST (15:00 UTC)"
      source_system: "Open-Meteo API (open-meteo.com)"
    config:
      freshness:
        warn_after: {count: 25, period: hour}
        error_after: {count: 49, period: hour}
      loaded_at_field: raw_ingested_at
    tables:
      - name: ext_environment_raw
        description: "Open-Meteo から取得した生の環境データ（気象・花粉・大気質）"
        columns:
          - name: observation_datetime_jst
            description: "観測日時（JST）"
          - name: observation_date
            description: "観測日付（YYYY-MM-DD）"
          - name: observation_hour
            description: "観測時刻の時（0-23）"
          - name: location_id
            description: "観測地点ID（seeds/location_master.csv 参照）"
          - name: latitude
            description: "緯度"
          - name: longitude
            description: "経度"
          - name: source_name
            description: "データソース名（open_meteo）"
          - name: temperature_c
            description: "気温（摂氏）"
          - name: apparent_temperature_c
            description: "体感気温（摂氏）"
          - name: pressure_hpa
            description: "気圧（hPa）"
          - name: humidity_pct
            description: "相対湿度（%）"
          - name: weather_code
            description: "WMO 天気コード（seeds/weather_codes.csv 参照）"
          - name: precipitation_mm
            description: "降水量（mm）"
          - name: wind_speed_mps
            description: "風速（m/s）"
          - name: uv_index
            description: "UV指数"
          - name: aqi
            description: "欧州大気質指数"
          - name: pm25
            description: "PM2.5（μg/m³）"
          - name: birch_pollen
            description: "白樺花粉（grains/m³）"
          - name: grass_pollen
            description: "イネ科花粉（grains/m³）"
          - name: weed_pollen
            description: "雑草花粉（grains/m³）"
          - name: raw_ingested_at
            description: "取込日時（UTC）- freshness チェック基準カラム"
          - name: request_id
            description: "Lambda リクエストID"
          - name: record_created_at
            description: "レコード作成日時（UTC）"

  - name: health_logs
    database: AwsDataCatalog
    schema: health_logger_prod_health_logs
    description: "Lambda → Firehose → S3 Tables (Iceberg) の体調記録。Cognito 認証済みユーザーの記録データ"
    meta:
      owner: riku_nishikawa
      sensitivity: personal
      domain: health
      pii_fields: [user_id]
      ingest_schedule: "リアルタイム（ユーザー記録時）"
      source_system: "health-logger PWA (frontend → API GW → Lambda → Firehose)"
    config:
      freshness:
        warn_after: {count: 25, period: hour}
        error_after: {count: 49, period: hour}
      loaded_at_field: written_at
    tables:
      - name: health_records
        description: "体調記録（daily/event/status）。Iceberg テーブル形式で S3 Tables に保存"
        columns:
          - name: id
            description: "レコードID（UUID v4）"
            tests:
              - not_null
              - unique
          - name: user_id
            description: "ユーザーID（Cognito sub クレーム、仮名識別子）"
            tests:
              - not_null
          - name: record_type
            description: "記録種別（daily: 日次記録 / event: イベント記録 / status: 状態変更）"
            tests:
              - not_null
              - accepted_values:
                  values: ['daily', 'event', 'status']
          - name: fatigue_score
            description: "疲労感スコア（0=元気, 10=極度の疲労）"
          - name: mood_score
            description: "気分スコア（0=最悪, 10=最高）"
          - name: motivation_score
            description: "やる気スコア（0=ゼロ, 10=最高）"
          - name: concentration_score
            description: "集中力スコア（0=ゼロ, 10=最高）。v2以降のみ存在"
          - name: flags
            description: |
              体調フラグ ビットマスク整数値。seeds/flags_master.csv が正規定義。
              poor_sleep=1, headache=2, stomachache=4, exercise=8, alcohol=16, caffeine=32
          - name: note
            description: "メモ（任意テキスト）"
          - name: recorded_at
            description: "記録日時（UTC）"
          - name: timezone
            description: "記録時のクライアントタイムゾーン（例: Asia/Tokyo）"
          - name: device_id
            description: "デバイスID（端末識別子）"
          - name: app_version
            description: "アプリバージョン"
          - name: written_at
            description: "Firehose 書き込み日時（UTC）- freshness チェック基準カラム"
          - name: custom_fields
            description: "拡張フィールド（JSON 文字列。将来の実験的フィールド用）"
