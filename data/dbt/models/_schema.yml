version: 2

models:
  - name: ext_environment_hourly
    description: "時間粒度の環境データファクトテーブル（気象・花粉・大気質）"
    columns:
      - name: observation_datetime_jst
        description: "観測日時（JST）"
        tests:
          - not_null
          - unique:
              combination_of_columns:
                - observation_datetime_jst
                - location_id

      - name: observation_date
        description: "観測日付"
        tests:
          - not_null

      - name: observation_hour
        description: "観測時刻の時（0-23）"
        tests:
          - not_null

      - name: location_id
        description: "観測地点ID"
        tests:
          - not_null

      - name: latitude
        description: "緯度"
        tests:
          - not_null

      - name: longitude
        description: "経度"
        tests:
          - not_null

      - name: source_name
        description: "データソース名"
        tests:
          - not_null
          - accepted_values:
              values: ['open_meteo']

      - name: temperature_c
        description: "気温（摂氏）"
        tests:
          - not_null

      - name: pressure_hpa
        description: "気圧（hPa）"
        tests:
          - not_null

      - name: humidity_pct
        description: "相対湿度（%）"
        tests:
          - not_null

  - name: ext_environment_daily
    description: "日次集約の環境データファクトテーブル"
    columns:
      - name: observation_date
        description: "観測日付"
        tests:
          - not_null
          - unique:
              combination_of_columns:
                - observation_date
                - location_id

      - name: location_id
        description: "観測地点ID"
        tests:
          - not_null

      - name: avg_temperature_c
        description: "日平均気温"
        tests:
          - not_null

      - name: avg_pressure_hpa
        description: "日平均気圧"
        tests:
          - not_null

  - name: health_env_joined_hourly
    description: "体調記録と環境データの結合テーブル"
    columns:
      - name: record_id
        description: "体調記録ID"
        tests:
          - not_null

      - name: user_id
        description: "ユーザーID"
        tests:
          - not_null
