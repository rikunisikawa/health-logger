default: &default
  adapter: postgresql
  encoding: unicode
  url: <%= ENV["DATABASE_URL"] %>
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: health_logger_development

test:
  <<: *default
  database: health_logger_test

production:
  primary: &primary_production
    <<: *default
    database: health_logger_production
    username: <%= ENV["DB_USERNAME"] %>
    password: <%= ENV["DB_PASSWORD"] %>
    host: <%= ENV["DB_HOST"] %>
  cache:
    <<: *primary_production
    database: health_logger_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: health_logger_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: health_logger_production_cable
    migrations_paths: db/cable_migrate
